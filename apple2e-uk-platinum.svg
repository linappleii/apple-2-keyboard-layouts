<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="600" viewBox="0 0 1780 600" version="1.1">
  <style>
    .key-text {
      font-family: "Helvetica", Arial, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #d1cfcd;
      text-anchor: start;
      dominant-baseline: text-top;
    }

    .key-text-small {
      font-family: "Helvetica", Arial, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #d1cfcd;
      text-anchor: start;
      dominant-baseline: text-top;
    }

    .key-body { fill: #332d29; }
    .key-top { fill: #3d3631; }
    .key-side-l { fill: #2b2622; }
    .key-side-r { fill: #2b2622; }
    .key-side-t { fill: #453d37; }
    .key-side-b { fill: #1e1a18; }

    #reset {
      text-anchor: middle;
      dominant-baseline: middle;
      font-size: 16px;
    }

    #tab {
      font-size: 25px;
    }

    #return {
      font-size: 20px;
    }

    .caps-lock, .shift {
      font-size: 30px
    }

    .apple-icon { fill: #444; }
  </style>

